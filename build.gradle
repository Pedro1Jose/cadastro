plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.5'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'dev.queijo'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-webmvc' // Dependencia para criar uma aplicacao web usando o Spring MVC, que é um framework para construir APIs RESTful e aplicações web.
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa' // Dependencia para usar o Spring Data JPA, que é um framework para facilitar o acesso a bancos de dados relacionais usando a especificacao JPA (Java Persistence API).
	testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}
